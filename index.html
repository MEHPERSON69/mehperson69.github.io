<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About Me</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 48px;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: bold;
      letter-spacing: 2px;
      color: #fff;
    }

    nav a {
      color: #aaa;
      text-decoration: none;
      margin-left: 24px;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover { color: #fff; }

    main {
      flex: 1;
      max-width: 720px;
      margin: 80px auto;
      padding: 0 24px;
      width: 100%;
    }

    .hero h2 {
      font-size: 2.2rem;
      color: #fff;
      margin-bottom: 16px;
    }

    .hero p {
      color: #aaa;
      line-height: 1.8;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .links-label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 12px;
    }

    .social-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 64px;
    }

    .social-links a, .social-links button {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      font-family: 'Courier New', monospace;
      padding: 8px 16px;
      border: 1px solid #333;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .social-links a:hover, .social-links button:hover {
      color: #fff;
      border-color: #555;
      background: #1a1a1a;
    }

    .section { margin-bottom: 48px; }

    .section h3 {
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: #444; }

    .card .platform {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card .username {
      font-size: 1rem;
      color: #e0e0e0;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid #222;
      color: #444;
      font-size: 0.8rem;
    }

    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #fff;
      color: #0f0f0f;
      padding: 10px 24px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-family: 'Courier New', monospace;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <header>

          GitHub

        <a href="https://x.com/MEHPERSON69" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>

    </div>

  </main>

</html>
