<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MEHPERSON</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1c1c1c;
      --text: #d4d4d4;
      --muted: #a3a3a3;
      --accent: #2dd4bf;
      --border: rgba(163,163,163,0.15);
    }
    body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', 'Courier New', monospace; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .container { max-width: 700px; margin: 0 auto; padding: 48px 24px; display: flex; flex-direction: column; gap: 64px; }
    header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo img { width: 44px; height: 44px; border-radius: 4px; image-rendering: pixelated; }
    .logo h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    nav { display: flex; align-items: center; font-size: 0.875rem; font-weight: 500; }
    nav a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    nav a:first-child { color: var(--accent); }
    nav a:hover { color: var(--accent); }
    .nav-sep { margin: 0 8px; color: var(--muted); opacity: 0.3; font-weight: 300; }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 6px; border-radius: 6px; display: flex; align-items: center; transition: color 0.2s, background 0.2s; }
    .icon-btn:hover { color: var(--accent); background: rgba(255,255,255,0.05); }
    .hero { display: flex; flex-direction: column; gap: 24px; }
    .hero h2 { font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .hero p { color: var(--muted); line-height: 1.8; font-size: 0.95rem; }
    .find-me { display: flex; align-items: center; gap: 24px; }
    .find-me span { color: var(--muted); font-size: 0.875rem; }
    .social-icons { display: flex; align-items: center; gap: 16px; }
    .social-icons a { color: var(--text); display: flex; padding: 4px; transition: color 0.2s; }
    .social-icons a:hover { color: var(--accent); }
    section { display: flex; flex-direction: column; gap: 32px; }
    .section-title { font-size: 1.1rem; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 8px; color: var(--text); }
    .gaming-list { display: flex; flex-direction: column; gap: 16px; }
    .gaming-item { display: flex; align-items: center; gap: 24px; cursor: pointer; }
    .gaming-item:hover .gaming-name { color: var(--accent); }
    .gaming-platform { color: var(--muted); font-size: 0.875rem; width: 100px; flex-shrink: 0; }
    .gaming-name { color: var(--text); font-size: 0.95rem; text-decoration: underline; text-decoration-color: rgba(163,163,163,0.3); text-underline-offset: 4px; text-decoration-thickness: 1px; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .gaming-name svg { opacity: 0.4; }
    footer { border-top: 1px solid var(--border); padding-top: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; font-size: 0.75rem; color: var(--muted); }
    footer a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--accent); }
    .footer-nav { display: flex; align-items: center; gap: 12px; }
    .footer-nav a:not(:last-child) { border-right: 1px solid rgba(163,163,163,0.3); padding-right: 12px; }
    #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--text); color: var(--bg); padding: 8px 20px; border-radius: 999px; font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

    document.documentElement.style.setProperty('--bg', dark ? '#1c1c1c' : '#ffffff');
    document.documentElement.style.setProperty('--text', dark ? '#d4d4d4' : '#1c1c1c');
    document.documentElement.style.setProperty('--muted', dark ? '#a3a3a3' : '#666666');
    document.body.style.background = dark ? '#1c1c1c' : '#ffffff';
  }
</script>
</body>
</html>
